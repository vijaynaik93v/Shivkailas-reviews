<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave Us a Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Noto+Sans+Devanagari:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --maroon: #9a1c1c;
    --maroon-dark: #7a1414;
    --gold: #d9a441;
    --bg-1: #fbf6ee;
    --bg-2: #f3e9d8;
    --text: #262220;
    --muted: #7a716a;
    --chip-bg: #faf6ef;
    --chip-border: #e6dcc8;
    --card-border: #efe4cf;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at 20% 0%, var(--bg-2) 0%, var(--bg-1) 55%);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
    padding: 24px;
  }
  .card {
    position: relative;
    background: #fffdfa;
    border: 1px solid var(--card-border);
    border-radius: 22px;
    box-shadow: 0 16px 50px rgba(120, 70, 30, 0.10);
    max-width: 460px;
    width: 100%;
    padding: 42px 32px 32px;
    text-align: center;
    overflow: hidden;
  }
  .card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: linear-gradient(90deg, var(--maroon), var(--gold));
  }
  .stars {
    font-size: 22px;
    letter-spacing: 6px;
    color: var(--gold);
    margin-bottom: 14px;
  }
  .business-name {
    font-family: 'Noto Sans Devanagari', 'Poppins', sans-serif;
    font-size: 27px;
    font-weight: 700;
    color: var(--maroon);
    margin: 0 0 10px;
    line-height: 1.35;
  }
  .subtitle {
    font-family: 'Inter', sans-serif;
    color: var(--muted);
    font-size: 14px;
    font-weight: 500;
    line-height: 1.6;
    margin: 0 0 28px;
  }
  .divider {
    width: 44px;
    height: 3px;
    background: var(--gold);
    border-radius: 3px;
    margin: 0 auto 26px;
  }
  .step-label {
    font-family: 'Poppins', sans-serif;
    text-align: left;
    font-size: 11.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin: 0 0 10px;
  }
  .prompts-panel {
    background: linear-gradient(160deg, #fbf1e0 0%, #f6e9d3 100%);
    border: 1.5px solid #ecdcb8;
    border-radius: 16px;
    padding: 18px 16px;
    margin-bottom: 22px;
  }
  .prompts-panel .step-label { margin-bottom: 12px; }
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .review-panel {
    background: #fff;
    border: 1.5px solid var(--card-border);
    border-radius: 14px;
    padding: 14px 14px 4px;
    box-shadow: inset 0 1px 4px rgba(120, 70, 30, 0.05);
    margin-bottom: 24px;
  }
  .chip {
    flex: 1 1 auto;
    background: #fffdf9;
    border: 1.5px solid var(--chip-border);
    color: var(--text);
    font-size: 13.5px;
    font-family: 'Inter', sans-serif;
    padding: 10px 14px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.18s ease;
    text-align: left;
    line-height: 1.3;
  }
  .chip:hover {
    border-color: var(--maroon);
    box-shadow: 0 2px 10px rgba(154, 28, 28, 0.10);
  }
  .chip.selected {
    background: var(--maroon);
    border-color: var(--maroon);
    color: #fff;
  }
  textarea {
    width: 100%;
    min-height: 50px;
    max-height: 90px;
    resize: none;
    border: none;
    background: transparent;
    border-radius: 8px;
    padding: 0 0 10px;
    font-size: 13.5px;
    font-family: 'Inter', sans-serif;
    color: var(--text);
    margin-bottom: 0;
    cursor: default;
  }
  textarea:focus { outline: none; }
  .copy-hint {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 600;
    color: #256029;
    background: #eaf6ec;
    border: 1px solid #cde9d1;
    border-radius: 999px;
    padding: 5px 12px;
    margin: 10px 0 4px;
    opacity: 0;
    max-height: 0;
    overflow: hidden;
    transition: opacity 0.2s ease;
  }
  .copy-hint.show {
    opacity: 1;
    max-height: 30px;
  }
  .copy-hint::before {
    content: "✓";
    font-size: 12px;
    font-weight: 700;
  }
  .review-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    background: linear-gradient(135deg, var(--maroon), var(--maroon-dark));
    color: #fff;
    text-decoration: none;
    border: none;
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 15px;
    padding: 15px 20px;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(154, 28, 28, 0.22);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .review-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 10px 26px rgba(154, 28, 28, 0.28);
  }
  .review-btn svg { flex-shrink: 0; background: #fff; border-radius: 50%; padding: 2px; }
  .toast {
    margin-top: 14px;
    font-size: 12.5px;
    color: #2e7d32;
    font-weight: 600;
    min-height: 18px;
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .toast.show { opacity: 1; }
  .footer-note {
    margin-top: 20px;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="stars">★★★★★</div>
    <p class="business-name">शिवकैलास मिसळ आणि भेळ</p>
    <p class="subtitle">We'd love your feedback — it only takes a moment.</p>
    <div class="divider"></div>

    <div class="prompts-panel">
      <p class="step-label">Tap what applies</p>
      <div class="chips" id="chips"></div>
    </div>

    <p class="step-label">Your review</p>
    <div class="review-panel">
      <textarea id="reviewText" readonly placeholder="Select a phrase above to preview your review..."></textarea>
      <p class="copy-hint" id="copyHint">Text copied — paste it on Google.</p>
    </div>

    <p class="step-label">Submit on Google</p>
    <button class="review-btn" id="postBtn">
      <svg width="18" height="18" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l6-6C34.6 5.1 29.6 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21 21-9.4 21-21c0-1.2-.1-2.4-.4-3.5z"/>
        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.4 19 12.5 24 12.5c3.1 0 5.8 1.1 8 3l6-6C34.6 5.1 29.6 3 24 3 15.9 3 8.9 7.6 6.3 14.7z"/>
        <path fill="#4CAF50" d="M24 45c5.5 0 10.4-1.8 14.2-5l-6.6-5.4C29.6 36.4 27 37.2 24 37.2c-5.3 0-9.7-3.4-11.3-8.2l-6.6 5.1C8.9 41.4 15.9 45 24 45z"/>
        <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.3 5.7l6.6 5.4C41.5 35.9 45 30.4 45 24c0-1.2-.1-2.4-.4-3.5z"/>
      </svg>
      Post My Review on Google
    </button>
    <div class="toast" id="toast">Copied! Paste it into the Google review box that just opened.</div>

    <p class="footer-note">Thank you for supporting our business!</p>
  </div>

  <script>
    // EDIT ME: change these quick-review phrases to match your menu / business
    const PHRASES = [
      "Best Misal in Pimple Saudagar 🔥",
      "Matki Bhel was amazing, highly recommend!",
      "Authentic Maharashtrian flavors, loved it",
      "Great taste and quick service",
      "A must-visit for misal lovers in Pune",
      "Clean place, friendly staff",
      "Value for money and delicious food"
    ];

    // EDIT ME: your Google review link
    const REVIEW_URL = "https://g.page/r/CfPd0UYqtnAREBM/review";

    const chipsEl = document.getElementById('chips');
    const textarea = document.getElementById('reviewText');
    const postBtn = document.getElementById('postBtn');
    const toast = document.getElementById('toast');
    const copyHint = document.getElementById('copyHint');

    const selected = new Set();

    async function copyToClipboard(text) {
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(text);
          return true;
        }
        textarea.removeAttribute('readonly');
        textarea.select();
        document.execCommand('copy');
        textarea.setAttribute('readonly', 'readonly');
        return true;
      } catch (e) {
        return false;
      }
    }

    function renderChips() {
      chipsEl.innerHTML = '';
      PHRASES.forEach((phrase, i) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'chip' + (selected.has(i) ? ' selected' : '');
        btn.textContent = phrase;
        btn.addEventListener('click', () => {
          if (selected.has(i)) selected.delete(i); else selected.add(i);
          renderChips();
          rebuildText();
        });
        chipsEl.appendChild(btn);
      });
    }

    function rebuildText() {
      const parts = PHRASES.filter((_, i) => selected.has(i));
      const text = parts.join('. ') + (parts.length ? '.' : '');
      textarea.value = text;

      if (text) {
        copyHint.textContent = "Ready — tap 'Post My Review on Google' below.";
        copyHint.classList.add('show');
      } else {
        copyHint.classList.remove('show');
      }
    }

    renderChips();

    postBtn.addEventListener('click', async () => {
      const text = textarea.value.trim();
      let copied = false;
      if (text) copied = await copyToClipboard(text);

      window.open(REVIEW_URL, '_blank', 'noopener');

      if (text) {
        copyHint.textContent = copied ? 'Text copied — paste it on Google.' : 'Tap and hold the box above to copy the text.';
        copyHint.classList.add('show');
        toast.textContent = 'Opened Google review — paste the copied text and submit.';
      } else {
        toast.textContent = 'Opening Google review — pick some phrases above to auto-write your review.';
      }
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 8000);
    });
  </script>
</body>
</html>
